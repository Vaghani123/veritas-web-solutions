<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" fill="none">
  <defs>
    <linearGradient id="rightGrad" x1="215" y1="90" x2="360" y2="440" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="55%" stop-color="#1d72e8"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <clipPath id="leftClip">
      <polygon points="82,92 212,92 250,432"/>
    </clipPath>
  </defs>

  <!-- Left arm — dark navy triangle -->
  <polygon points="82,92 212,92 250,432" fill="#1a2f6b"/>

  <!-- Right arm — gradient blue triangle -->
  <polygon points="212,92 418,92 250,432" fill="url(#rightGrad)"/>

  <!-- Globe grid clipped to left arm -->
  <g clip-path="url(#leftClip)" fill="none" stroke="white" stroke-linecap="round">
    <!-- Outer arc (globe left boundary) -->
    <path d="M 186,195 C 150,255 148,330 178,420" stroke-width="5.5" opacity="0.55"/>
    <!-- Longitude arcs -->
    <path d="M 200,195 C 171,255 170,330 196,420" stroke-width="4.5" opacity="0.42"/>
    <path d="M 215,195 C 192,255 192,330 214,420" stroke-width="4.5" opacity="0.38"/>
    <path d="M 230,195 C 212,255 213,330 231,420" stroke-width="4.5" opacity="0.34"/>
    <!-- Latitude arcs -->
    <path d="M 177,242 Q 207,252 232,242" stroke-width="4.5" opacity="0.45"/>
    <path d="M 174,288 Q 207,300 234,288" stroke-width="4.5" opacity="0.45"/>
    <path d="M 175,334 Q 209,347 236,334" stroke-width="4.5" opacity="0.45"/>
    <path d="M 177,380 Q 212,393 239,380" stroke-width="4.5" opacity="0.45"/>
  </g>
</svg>
